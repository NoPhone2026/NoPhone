<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoPhone — Coming Soon</title>
  <meta name="description" content="The NoPhone. Zero apps. Zero notifications. Zero screen time. Sign up to be the first to know when we're back.">
  <link rel="canonical" href="https://www.thenophone.com">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.thenophone.com">
  <meta property="og:title" content="The NoPhone — Coming Soon">
  <meta property="og:description" content="Zero apps. Zero notifications. Zero screen time. Sign up to be the first to know.">
  <meta property="og:image" content="https://www.thenophone.com/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The NoPhone — Coming Soon">
  <meta name="twitter:description" content="Zero apps. Zero notifications. Zero screen time. Sign up to be the first to know.">
  <meta name="twitter:image" content="https://www.thenophone.com/og-image.jpg">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      color: #fff;
      background: #000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
    }

    .logo {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: clamp(14px, 2.5vw, 18px);
      color: rgba(255, 255, 255, 0.6);
      max-width: 400px;
      line-height: 1.5;
    }

    .signup-form,
    .signup-success {
      margin-top: 28px;
    }

    .signup-form {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 420px;
      border-radius: 100px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .signup-form input {
      flex: 1;
      padding: 14px 24px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      outline: none;
      min-width: 0;
    }

    .signup-form input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .signup-form button {
      padding: 14px 28px;
      border: none;
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .signup-form button:hover {
      background: rgba(255, 255, 255, 0.85);
    }

    .signup-form button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .signup-success {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 420px;
      padding: 14px 24px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .signup-error {
      font-size: 13px;
      color: #ff6b6b;
      max-width: 420px;
    }

    .privacy-link {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1;
    }

    .privacy-link a {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
    }

    .privacy-link a:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 480px) {
      .signup-form {
        flex-direction: column;
        border-radius: 16px;
      }

      .signup-form input {
        padding: 16px 20px;
        text-align: center;
      }

      .signup-form button {
        padding: 16px 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
      <source src="nophone.webm" type="video/webm">
      <source src="nophone.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
      <span class="badge">Coming Soon</span>
      <h1 class="logo">The NoPhone</h1>
      <p class="tagline">Something new is coming.<br>Sign up to be the first to know.</p>
      <form class="signup-form" id="signup-form">
        <input type="email" name="EMAIL" id="email-input" placeholder="Your email" required>
        <div style="position:absolute;left:-5000px" aria-hidden="true"><input type="text" name="b_ee0e209d501deee51402b8f68_8b1f44b705" tabindex="-1" value=""></div>
        <button type="submit" id="submit-btn">Notify me</button>
      </form>
      <p class="signup-error" id="signup-error" style="display:none"></p>
    </div>
  </section>
  <div class="privacy-link"><a href="/privacy.html">Privacy Policy</a></div>
  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email-input').value;
      var btn = document.getElementById('submit-btn');
      var form = this;
      var errorEl = document.getElementById('signup-error');

      btn.disabled = true;
      btn.textContent = '...';
      errorEl.style.display = 'none';

      var url = 'https://thenophone.us2.list-manage.com/subscribe/post-json?u=ee0e209d501deee51402b8f68&id=8b1f44b705&f_id=00c1c4e1f0&EMAIL=' + encodeURIComponent(email) + '&c=mc_callback';

      window.mc_callback = function(data) {
        if (data.result === 'success') {
          form.outerHTML = '<div class="signup-success">You\'re on the list!</div>';
        } else {
          var msg = data.msg || 'Something went wrong. Please try again.';
          if (msg.includes('already subscribed')) {
            msg = 'You\'re already on the list!';
          }
          errorEl.textContent = msg.replace(/<[^>]*>/g, '');
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Notify me';
        }
        var script = document.getElementById('mc-script');
        if (script) script.remove();
      };

      var script = document.createElement('script');
      script.id = 'mc-script';
      script.src = url;
      document.body.appendChild(script);
    });

    var video = document.getElementById('bg-video');
    var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    if (isSafari) {
      video.innerHTML = '<source src="nophone.mp4" type="video/mp4">';
      video.load();
      video.play();
    }
  </script>
</body>
</html>
